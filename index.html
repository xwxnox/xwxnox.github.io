<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ink.</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;1,400&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f4f0;
    --fg: #111;
    --muted: #999;
    --border: #ddd8d0;
    --accent: #b84c2e;
    --code-bg: #eceae5;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Newsreader', serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.85;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { max-width: 600px; margin: 0 auto; padding: 0 20px; }

  /* ── header ── */
  header {
    padding: 44px 0 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  header h1 {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    cursor: pointer;
  }

  .tabs {
    display: flex;
    gap: 16px;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .tabs span {
    cursor: pointer;
    transition: color 0.15s;
    padding-bottom: 2px;
  }

  .tabs span:hover { color: var(--fg); }
  .tabs span.on { color: var(--fg); border-bottom: 1px solid var(--fg); }

  /* ── views ── */
  .view { display: none; padding: 36px 0 60px; }
  .view.active { display: block; }

  /* ── list ── */
  .post-item {
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s;
  }

  .post-item:hover { opacity: 0.65; }

  .post-item .date {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }

  .post-item .title {
    font-size: 0.95rem;
    margin-top: 2px;
  }

  /* ── reader ── */
  .reader-back {
    font-size: 0.82rem;
    color: var(--muted);
    cursor: pointer;
    display: inline-block;
    margin-bottom: 24px;
  }

  .reader-back:hover { color: var(--fg); }

  .article-title {
    font-size: 1.5rem;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 6px;
  }

  .article-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .article-body {
    font-size: 0.95rem;
    line-height: 2;
  }

  .article-body p { margin-bottom: 16px; }
  .article-body h3 { font-size: 1.15rem; font-weight: 600; margin: 32px 0 12px; }
  .article-body h4 { font-size: 1.02rem; font-weight: 600; margin: 24px 0 10px; }
  .article-body blockquote {
    border-left: 2px solid var(--border);
    padding-left: 16px;
    color: var(--muted);
    font-style: italic;
    margin: 20px 0;
  }
  .article-body code {
    font-family: 'DM Mono', monospace;
    font-size: 0.84em;
    background: var(--code-bg);
    padding: 2px 5px;
  }
  .article-body pre {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    background: var(--code-bg);
    padding: 16px;
    overflow-x: auto;
    margin: 20px 0;
    line-height: 1.6;
    border: 1px solid var(--border);
  }
  .article-body a { color: var(--accent); }
  .article-body img { max-width: 100%; margin: 16px 0; }
  .article-body ul, .article-body ol { padding-left: 20px; margin-bottom: 16px; }
  .article-body li { margin-bottom: 4px; }
  .article-body hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

  /* ── empty / loading ── */
  .empty-msg {
    text-align: center;
    color: var(--muted);
    font-size: 0.88rem;
    padding: 48px 0;
  }

  /* ── anim ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade { animation: fadeUp 0.3s ease forwards; }

  /* ── responsive ── */
  @media (max-width: 480px) {
    header { padding: 32px 0 20px; flex-direction: column; gap: 12px; }
    .article-title { font-size: 1.25rem; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1 onclick="go('list')">ink.</h1>
  </header>

  <!-- list -->
  <div class="view active" id="v-list">
    <div id="postList"><div class="empty-msg fade">불러오는 중...</div></div>
  </div>

  <!-- reader -->
  <div class="view" id="v-read">
    <span class="reader-back" onclick="go('list')">← 목록으로</span>
    <div class="article-title" id="aTitle"></div>
    <div class="article-meta" id="aMeta"></div>
    <div class="article-body" id="aBody"></div>
  </div>

</div>

<script>
/* ═══════════════════════════════════════
   CONFIG — GitHub raw URL for posts.json
   ═══════════════════════════════════════
   GitHub Pages 사용 시:
     https://<username>.github.io/<repo>/posts.json

   또는 raw URL:
     https://raw.githubusercontent.com/<username>/<repo>/main/posts.json
   ═══════════════════════════════════════ */
const POSTS_URL = 'posts.json'; // ← 같은 repo에 배포 시 상대경로로 충분
const TELEGRAPH = 'https://api.telegra.ph';

let posts = [];

/* ═══════════════════════════════════════
   LOAD
   ═══════════════════════════════════════ */
async function loadPosts() {
  try {
    const res = await fetch(POSTS_URL, { cache: 'no-cache' });
    if (!res.ok) throw new Error(res.status);
    posts = await res.json();
    renderList();
  } catch (e) {
    document.getElementById('postList').innerHTML =
      '<div class="empty-msg">글을 불러올 수 없습니다</div>';
  }
}

/* ═══════════════════════════════════════
   NAV
   ═══════════════════════════════════════ */
function go(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('v-' + v).classList.add('active');
  if (v === 'list') renderList();
}

/* ═══════════════════════════════════════
   LIST
   ═══════════════════════════════════════ */
function renderList() {
  const el = document.getElementById('postList');
  if (posts.length === 0) {
    el.innerHTML = '<div class="empty-msg fade">아직 글이 없습니다</div>';
    return;
  }
  el.innerHTML = posts.map((p, i) => `
    <div class="post-item fade" style="animation-delay:${i * 0.04}s" onclick="readPost('${esc(p.path)}')">
      <div class="date">${p.date || ''}</div>
      <div class="title">${esc(p.title)}</div>
    </div>
  `).join('');
}

/* ═══════════════════════════════════════
   READER
   ═══════════════════════════════════════ */
async function readPost(path) {
  go('read');
  const meta = posts.find(p => p.path === path);
  document.getElementById('aTitle').textContent = meta ? meta.title : '';
  document.getElementById('aMeta').textContent = meta ? meta.date : '';
  document.getElementById('aBody').innerHTML = '<span style="color:var(--muted)">불러오는 중...</span>';

  try {
    const page = await telegraphGet(`/getPage/${path}?return_content=true`);
    document.getElementById('aTitle').textContent = page.title;
    document.getElementById('aMeta').textContent =
      (page.author_name || '') + (page.views !== undefined ? '  ·  ' + page.views + ' views' : '');
    document.getElementById('aBody').innerHTML = renderNodes(page.content);
    document.getElementById('aBody').classList.add('fade');
    setTimeout(() => document.getElementById('aBody').classList.remove('fade'), 400);
  } catch (e) {
    document.getElementById('aBody').innerHTML = '불러오기 실패: ' + esc(e.message);
  }
}

/* ═══════════════════════════════════════
   TELEGRAPH
   ═══════════════════════════════════════ */
async function telegraphGet(path) {
  const r = await fetch(TELEGRAPH + path);
  const d = await r.json();
  if (!d.ok) throw new Error(d.error || 'API error');
  return d.result;
}

/* ═══════════════════════════════════════
   TELEGRAPH NODES → HTML
   ═══════════════════════════════════════ */
function renderNodes(nodes) {
  if (!nodes) return '';
  return nodes.map(n => {
    if (typeof n === 'string') return esc(n);
    if (!n.tag) return '';
    const ok = ['a','aside','b','blockquote','br','code','em','figcaption','figure','h3','h4','hr','i','iframe','img','li','ol','p','pre','s','strong','u','ul'];
    if (!ok.includes(n.tag)) return '';
    let a = '';
    if (n.attrs) {
      if (n.attrs.href) a += ` href="${esc(n.attrs.href)}" target="_blank"`;
      if (n.attrs.src) a += ` src="${esc(n.attrs.src)}"`;
    }
    if (['br','hr','img'].includes(n.tag)) return `<${n.tag}${a}>`;
    return `<${n.tag}${a}>${n.children ? renderNodes(n.children) : ''}</${n.tag}>`;
  }).join('');
}

/* ═══════════════════════════════════════
   UTIL
   ═══════════════════════════════════════ */
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

/* ═══════════════════════════════════════
   INIT
   ═══════════════════════════════════════ */
window.addEventListener('load', loadPosts);
</script>
</body>
</html>
